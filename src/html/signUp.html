<head>
    <link rel="stylesheet" href="..\style.css">
</head>

<body class="darkBlue" style="background-color: #00131f;">
    <div class="bgDarkBlue center">
        
        <br>

        <div class="divBackWanabe">
            <h1>Sign Up</h1>   
        </div>

        <br>

        <div class="divBackWanabe">
            <h3>User Name</h3>
            <textarea id="uName" class="no-resize"></textarea>

            <h3>Your Email: </h3>
            <textarea id="email" class="no-resize"></textarea>
            <br>    

            <h3>Password</h3>
            <textarea id="pass1" class="no-resize"></textarea>
            <br>

            <h3>Repeat Password</h3>
            <textarea id="pass2" class="no-resize"></textarea>
            <br>

            <br>
            <button id="button"><h2>Sign Up</h2></button>
            <a href="logIn.html">
                <p>Have an Account? Log in!</p>
            </a>
        </div>

        <br>
    </div>

</body>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="..\main.js"></script>
<script>
var debounce = true

button.addEventListener("click", async () => {
    if (debounce)
    {
        debounce = false
        console.log("loading")

        popup("Loading. Please wait.")

        const email = document.getElementById("email").value;
        const pass1 = document.getElementById("pass1").value;
        const pass2 = document.getElementById("pass2").value;
        const username = document.getElementById("uName").value;

        if (pass1 !== pass2) {
            alert("Passwords are NOT the same");
            return;
        }

        const user = await signUp(email, pass1, username);

        await updateData(user.uid, {
            uName: username || "anon",
            points: 0,
        });

        window.location.href = "home.html"
    }
});
</script>
