<head>
    <link rel="stylesheet" href="..\style.css">
</head>

<body class="darkBlue" style="background-color: #00131f;">
    <div class="bgDarkBlue center">
        
        <br>

        <div class="divBackWanabe">
            <h1>Sign Up</h1>   
        </div>

        <br>

        <div class="divBackWanabe">
            <h3>User Name</h3>
            <textarea id="uName" class="no-resize">example_user_name</textarea>

            <h3>Your Email: </h3>
            <textarea id="email" class="no-resize">example_email@email.com</textarea>
            <br>    

            <h3>Password</h3>
            <textarea id="pass1" class="no-resize">example_password</textarea>
            <br>

            <h3>Repeat Password</h3>
            <textarea id="pass2" class="no-resize">example_password</textarea>
            <br>

            <br>
            <button id="button"><h2>Sign Up</h2></button>
            <a href="logIn.html">
                <p>Have an Account? Log in!</p>
            </a>
        </div>

        <br>
    </div>

</body>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="..\main.js"></script>
<script>

const email = document.getElementById("email")
const pass1 = document.getElementById("pass1")
const pass2 = document.getElementById("pass2")
const button = document.getElementById("button")
const uName = document.getElementById("uName")

button.addEventListener("click", async () => {
    if (pass1.value === pass2.value) {

        const user = await signUp(email.value, pass1.value);

        await updateData({ uName: uName.value });

    } 
    else {
        alert("Passwords are NOT the same");
    }
});
</script>
