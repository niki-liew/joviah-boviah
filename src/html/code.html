<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>

<body style="margin: 0; overflow: hidden; background-color: #333;"  >
    <button onclick="runCode()">run code</button>

  <div class="flexbox">
    <div>

      
      <textarea id="code" style="resize: none; width: 50vw; height: 100vh">print("Hello, world!")</textarea>
      <br>

    </div>

    <div>

      <pre id="terminal" style="width: 50vw; height: 100vh; background-color: #000000; color: #ffffff" ></pre>
      <!-- <input id="stdin" placeholder="Type input and press Enter" onkeydown="handleInput(event)" -->

    </div>
  </div>

  <script>
    let pyodide;
    let inputBuffer = [];

    async function loadPyodideAndPackages() {
      pyodide = await loadPyodide();

      // stdout
      pyodide.setStdout({
        batched: (text) => {
          document.getElementById("terminal").textContent += text;
        }
      });

      // stderr
      pyodide.setStderr({
        batched: (text) => {
          document.getElementById("terminal").textContent += text;
        }
      });

      // override input()
      pyodide.globals.set("input", async () => {
        return new Promise(resolve => {
          const check = () => {
            if (inputBuffer.length > 0) {
              resolve(inputBuffer.shift());
            } else {
              setTimeout(check, 100);
            }
          };
          check();
        });
      });
    }

    loadPyodideAndPackages();

    async function runCode() {
      const code = document.getElementById("code").value;
      const terminal = document.getElementById("terminal");
      terminal.textContent = "";

      try {
        await pyodide.runPythonAsync(code);
      } catch (err) {
        terminal.textContent += err;
      }
    }

    function handleInput(event) {
      if (event.key === "Enter") {
        const val = event.target.value;
        inputBuffer.push(val);
        document.getElementById("terminal").textContent += val + "\n";
        event.target.value = "";
      }
    }
  </script>
</body>
</html>
